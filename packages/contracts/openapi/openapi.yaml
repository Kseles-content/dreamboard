openapi: 3.1.0
info:
  title: DreamBoard Contracts API
  version: 1.0.0
  description: Day 1 contracts for users and boards.
servers:
  - url: https://api.dreamboard.local
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /boards:
    get:
      summary: List boards
      operationId: listBoards
      parameters:
        - in: query
          name: ownerUserId
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Boards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'
    post:
      summary: Create board
      operationId: createBoard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardInput'
      responses:
        '201':
          description: Board created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
components:
  schemas:
    User:
      type: object
      required: [id, email, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateUserInput:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
      additionalProperties: false
    Board:
      type: object
      required: [id, ownerUserId, title, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        ownerUserId:
          type: integer
          format: int64
        title:
          type: string
          minLength: 1
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateBoardInput:
      type: object
      required: [ownerUserId, title]
      properties:
        ownerUserId:
          type: integer
          format: int64
        title:
          type: string
          minLength: 1
        description:
          type: string
      additionalProperties: false
