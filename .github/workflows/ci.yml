name: Day1 CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, 'feature/**', 'chore/**' ]
  workflow_dispatch:

jobs:

  heartbeat-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Heartbeat smoke (demo check)
        run: bash scripts/demo-check.sh

  contracts-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required contracts
        run: |
          test -f packages/contracts/openapi/openapi.yaml
          test -f packages/contracts/sql/schema.sql
          test -f packages/contracts/json-schema/board-state-v1.schema.json

  api-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install API dependencies
        run: npm --prefix apps/api ci
      - name: API build
        run: |
          npm --prefix apps/api run build

  api-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root dependencies
        run: npm ci
      - name: Unit tests
        run: npm test -- --runInBand

  api-e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dreamboard
          POSTGRES_PASSWORD: dreamboard123
          POSTGRES_DB: dreamboard
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dreamboard -d dreamboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root dependencies
        run: npm ci
      - name: Apply Prisma migrations (e2e DB)
        env:
          DATABASE_URL: postgresql://dreamboard:dreamboard123@localhost:5433/dreamboard
        run: npm run migrate:prod
      - name: E2E tests
        env:
          DATABASE_URL: postgresql://dreamboard:dreamboard123@localhost:5433/dreamboard
        run: npm run test:e2e -- --runInBand
      - name: API smoke test
        env:
          DATABASE_URL: postgresql://dreamboard:dreamboard123@localhost:5433/dreamboard
          NODE_ENV: test
          PORT: 3000
          JWT_SECRET: ci-smoke-secret
          S3_BUCKET: dreamboard-assets
          S3_REGION: us-east-1
          S3_ENDPOINT: https://s3.test.local
          S3_ACCESS_KEY_ID: test-key
          S3_SECRET_ACCESS_KEY: test-secret
          STORAGE_UPLOAD_BASE_URL: https://uploads.test.local
          STORAGE_PUBLIC_BASE_URL: https://cdn.test.local
          PUBLIC_WEB_BASE_URL: http://localhost:3100
        run: bash scripts/smoke-test.sh

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Web dependencies
        run: npm --prefix apps/web ci
      - name: Web build
        run: npm --prefix apps/web run build
      - name: Web test
        run: npm --prefix apps/web run test

  mobile-analyze-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Bootstrap Android project
        working-directory: apps/mobile
        run: flutter create --platforms android .
      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get
      - name: Flutter analyze
        working-directory: apps/mobile
        run: flutter analyze
      - name: Flutter test
        working-directory: apps/mobile
        run: flutter test
      - name: Flutter build apk (debug)
        working-directory: apps/mobile
        run: flutter build apk --debug
